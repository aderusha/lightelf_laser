name: Feature request
description: Suggest an improvement or new supported projector behavior
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: feature
    attributes:
      label: What would you like to add?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Describe the device, workflow, or BLE behavior this relates to.
    validations:
      required: false
