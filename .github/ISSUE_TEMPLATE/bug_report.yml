name: Bug report
description: Report a problem with the LightElf Laser integration
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail to reproduce it.
  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      placeholder: "2026.6.0"
    validations:
      required: true
  - type: input
    id: integration_version
    attributes:
      label: Integration version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Projector model or advertised BLE name
      placeholder: "Eytse EY003-L / TD5322A..."
    validations:
      required: false
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Add integration
        2. Select SVG
        3. Press Display selected SVG
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
    validations:
      required: false
