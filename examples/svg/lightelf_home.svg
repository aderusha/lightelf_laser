<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <style>
    .house-outline {
      fill: none;
      stroke: #2D3748; /* Dark charcoal/slate gray outline matching the image */
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .laser-red {
      fill: none;
      stroke: #EF4444; /* Pure vibrant Red */
      stroke-width: 3;
      stroke-linecap: round;
    }
    .laser-green {
      fill: none;
      stroke: #10B981; /* Pure vibrant Green */
      stroke-width: 3;
      stroke-linecap: round;
    }
    .laser-blue {
      fill: none;
      stroke: #3B82F6; /* Pure vibrant Blue */
      stroke-width: 3;
      stroke-linecap: round;
    }
  </style>

  <g id="laser-beams">
    <line x1="22" y1="78" x2="55" y2="38" class="laser-red" />
    
    <line x1="22" y1="78" x2="65" y2="51" class="laser-green" />
    
    <line x1="22" y1="78" x2="74" y2="65" class="laser-blue" />
  </g>

  <path d="M 50,15 
           L 12,48 
           L 20,48 
           L 20,80 
           L 80,80 
           L 80,48 
           L 88,48 
           Z" 
        class="house-outline" />
</svg>